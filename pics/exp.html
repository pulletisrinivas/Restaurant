<!--Create a food restaurant website -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codegnan Restaurant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Welcome to Devils Kitchen</h1>
            <p>Hot • Spicy • Delicious</p>
            <button class="btn-3d">Order Now</button>
        </div>
    </div>  
    <div class="container">
        <div class="menu">
            <h2>Our Menu</h2>
            <div class="menu-item">
                <img src="images/margherita.jpg" alt="Margherita Pizza">
                <h6>Margherita</h6>
                <p>₹149</p>
                <button class="btn-3d">Order</button>
                <button class="btn-3d">Cart</button>
            </div>
            <div class="menu-item">
                <img src="images/cheese_burst.jpg" alt="Cheese Burst Pizza">
                <h6>Cheese Burst</h6>
                <p>₹199</p>
                <button class="btn-3d">Order</button>
                <button class="btn-3d">Cart</button>
            </div>
            <div class="menu-item">
                <img src="images/veg_deluxe.jpg" alt="Veg Deluxe Pizza">
                <h6>Veg Deluxe</h6>
                <p>₹179</p>
                <button class="btn-3d">Order</button>
                <button class="btn-3d">Cart</button>
            </div>
            <div class="menu-item">
                <img src="images/chicken_pizza.jpg" alt="Chicken Pizza">
                <h6>Chicken Pizza</h6>
                <p>₹229</p>
                <button class="btn-3d">Order</button>
                <button class="btn-3d">Cart</button>
            </div>
            <div class="menu-item">
                <img src="images/veg_burger.jpg" alt="Veg Burger">
                <h6>Veg Burger</h6>
                <p>₹79</p>
                <button class="btn-3d">Order</button>
                <button class="btn-3d">Cart</button>
            </div>
            <div class="menu-item">
                <img src="images/chicken_burger.jpg" alt="Chicken Burger">
                <h6>Chicken Burger</h6>
                <p>₹129</p>
                <button class="btn-3d">Order</button>
                <button class="btn-3d">Cart</button>
            </div>
        </div>
    </div>
</body>
</html>
